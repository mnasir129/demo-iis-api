---
- name: Deploy DemoIisApi to IIS
  hosts: windows
  gather_facts: false

  vars:
    app_name: DemoIisApi
    app_pool_name: DemoIisApiPool
    site_name: "Default Web Site"
    app_virtual_path: "/DemoIisApi"
    deploy_root: "C:\\inetpub\\wwwroot\\DemoIisApi"
    staging_root: "C:\\deploy\\DemoIisApi"
    artifact_name: "demo-api.tar.gz"
    artifact_windows_path: "C:\\deploy\\DemoIisApi\\demo-api.tar.gz"

  tasks:
    - name: Validate artifact path was provided
      ansible.builtin.assert:
        that:
          - demo_api_code_tarball is defined
          - demo_api_code_tarball | length > 0
        fail_msg: "demo_api_code_tarball must be provided using --extra-vars"

    - name: Ensure staging directory exists
      ansible.windows.win_file:
        path: "{{ staging_root }}"
        state: directory

    - name: Ensure deployment directory exists
      ansible.windows.win_file:
        path: "{{ deploy_root }}"
        state: directory

    - name: Copy artifact to Windows staging directory
      ansible.windows.win_copy:
        src: "{{ demo_api_code_tarball }}"
        dest: "{{ artifact_windows_path }}"

    - name: Stop IIS app pool if it exists
      ansible.windows.win_shell: |
        Import-Module WebAdministration
        if (Test-Path "IIS:\AppPools\{{ app_pool_name }}") {
          Stop-WebAppPool -Name "{{ app_pool_name }}" -ErrorAction SilentlyContinue
        }
      args:
        executable: powershell.exe

    - name: Remove old deployed files
      ansible.windows.win_shell: |
        if (Test-Path "{{ deploy_root }}") {
          Get-ChildItem -Path "{{ deploy_root }}" -Force | Remove-Item -Recurse -Force
        }
      args:
        executable: powershell.exe

    - name: Extract new application package
      ansible.windows.win_shell: |
        tar -xzf "{{ artifact_windows_path }}" -C "{{ deploy_root }}"
      args:
        executable: powershell.exe

    - name: Create IIS app pool if missing
      ansible.windows.win_shell: |
        Import-Module WebAdministration

        if (-not (Test-Path "IIS:\AppPools\{{ app_pool_name }}")) {
          New-WebAppPool -Name "{{ app_pool_name }}"
        }

        Set-ItemProperty "IIS:\AppPools\{{ app_pool_name }}" -Name managedRuntimeVersion -Value ""
        Set-ItemProperty "IIS:\AppPools\{{ app_pool_name }}" -Name processModel.identityType -Value "ApplicationPoolIdentity"
      args:
        executable: powershell.exe

    - name: Create or update IIS application
      ansible.windows.win_shell: |
        Import-Module WebAdministration

        $appPath = "IIS:\Sites\{{ site_name }}{{ app_virtual_path }}"

        if (Test-Path $appPath) {
          Set-ItemProperty $appPath -Name physicalPath -Value "{{ deploy_root }}"
          Set-ItemProperty $appPath -Name applicationPool -Value "{{ app_pool_name }}"
        }
        else {
          New-WebApplication `
            -Site "{{ site_name }}" `
            -Name "{{ app_name }}" `
            -PhysicalPath "{{ deploy_root }}" `
            -ApplicationPool "{{ app_pool_name }}"
        }
      args:
        executable: powershell.exe

    - name: Start IIS app pool
      ansible.windows.win_shell: |
        Import-Module WebAdministration
        Start-WebAppPool -Name "{{ app_pool_name }}"
      args:
        executable: powershell.exe

    - name: Test health endpoint from Windows server
      ansible.windows.win_uri:
        url: "http://localhost{{ app_virtual_path }}/health"
        method: GET
        status_code: 200
        return_content: true
      register: health_result

    - name: Show health endpoint response
      ansible.builtin.debug:
        var: health_result.content