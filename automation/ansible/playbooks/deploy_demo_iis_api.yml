---
- name: Deploy DemoIisApi to IIS
  hosts: windows
  gather_facts: false

  vars:
    app_name: DemoIisApi
    app_pool_name: DemoIisApiPool
    site_name: "Default Web Site"
    app_virtual_path: "/DemoIisApi"
    deploy_root: "C:\\inetpub\\wwwroot\\DemoIisApi"
    staging_root: "C:\\deploy\\DemoIisApi"
    artifact_name: "demo-api.tar.gz"
    artifact_windows_path: "C:\\deploy\\DemoIisApi\\demo-api.tar.gz"

  tasks:
    - name: Validate artifact path was provided
      ansible.builtin.assert:
        that:
          - demo_api_code_tarball is defined
          - demo_api_code_tarball | length > 0
        fail_msg: "demo_api_code_tarball must be provided using --extra-vars"

    - name: Ensure staging directory exists
      ansible.windows.win_file:
        path: "{{ staging_root }}"
        state: directory

    - name: Ensure deployment directory exists
      ansible.windows.win_file:
        path: "{{ deploy_root }}"
        state: directory

    - name: Copy artifact to Windows staging directory
      ansible.windows.win_copy:
        src: "{{ demo_api_code_tarball }}"
        dest: "{{ artifact_windows_path }}"

    - name: Stop IIS app pool if it exists
      ansible.windows.win_shell: |
        Import-Module WebAdministration

        $appPoolName = "{{ app_pool_name }}"

        if (Test-Path "IIS:\AppPools\$appPoolName") {
          Stop-WebAppPool -Name $appPoolName -ErrorAction SilentlyContinue
        }
      args:
        executable: powershell.exe

    - name: Remove old deployed files
      ansible.windows.win_shell: |
        $deployRoot = "{{ deploy_root }}"

        if (Test-Path $deployRoot) {
          Get-ChildItem -Path $deployRoot -Force | Remove-Item -Recurse -Force
        }
      args:
        executable: powershell.exe

    - name: Extract new application package
      ansible.windows.win_shell: |
        $artifactPath = "{{ artifact_windows_path }}"
        $deployRoot = "{{ deploy_root }}"

        tar -xzf $artifactPath -C $deployRoot
      args:
        executable: powershell.exe

    - name: Create IIS app pool if missing
      ansible.windows.win_shell: |
        Import-Module WebAdministration

        $appPoolName = "{{ app_pool_name }}"

        if (-not (Test-Path "IIS:\AppPools\$appPoolName")) {
          New-WebAppPool -Name $appPoolName
        }

        Set-ItemProperty "IIS:\AppPools\$appPoolName" -Name managedRuntimeVersion -Value ""
        Set-ItemProperty "IIS:\AppPools\$appPoolName" -Name processModel.identityType -Value "ApplicationPoolIdentity"
      args:
        executable: powershell.exe

    - name: Create or recreate IIS application
      ansible.windows.win_shell: |
        Import-Module WebAdministration

        $siteName = "{{ site_name }}"
        $appName = "{{ app_name }}"
        $physicalPath = "{{ deploy_root }}"
        $appPoolName = "{{ app_pool_name }}"

        $existingApp = Get-WebApplication -Site $siteName | Where-Object {
          $_.path -eq "/$appName"
        }

        if ($existingApp) {
          Remove-WebApplication -Site $siteName -Name $appName
        }

        New-WebApplication `
          -Site $siteName `
          -Name $appName `
          -PhysicalPath $physicalPath `
          -ApplicationPool $appPoolName
      args:
        executable: powershell.exe

    - name: Start IIS app pool
      ansible.windows.win_shell: |
        Import-Module WebAdministration

        $appPoolName = "{{ app_pool_name }}"

        Start-WebAppPool -Name $appPoolName
      args:
        executable: powershell.exe

    - name: Test health endpoint from Windows server
      ansible.windows.win_uri:
        url: "http://localhost{{ app_virtual_path }}/health"
        method: GET
        status_code: 200
        return_content: true
      register: health_result
      retries: 5
      delay: 3
      until: health_result.status_code == 200

    - name: Show health endpoint response
      ansible.builtin.debug:
        var: health_result.content